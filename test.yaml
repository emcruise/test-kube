apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      ecoscape/node: "kube1-1" # Entspricht definition.location
  template:
    metadata:
      labels:
        ecoscape/node: "kube1-1"
    spec:
      initContainers:
        - name: copy
          image: hendrikreiter/dog-test-images
          command:
            - "/bin/sh"
            - "-c"
            - "cp -r /images/ /image"
          volumeMounts:
            - name: image
              mountPath: "/image"
      containers:
        - name: image-producer
          image: hendrikreiter/image_producer
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: web
          env:
            - name: BOOTSTRAP_SERVER
              value: "kafka-cluster-kafka-bootstrap.kafka.svc:9092"
            - name: TOPIC
              value: "images"
            - name: SEND_INTERVAL
              value: "1"
            - name: KEY
              value: "0-20"
          resources:
            limits:
              memory: "1Gi"
              cpu: "1"
            requests:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: image
              mountPath: "/Images"
              readOnly: true
      volumes:
        - name: image
          emptyDir:
            sizeLimit: "1Gi"
